name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build Plugin
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename and prepare asset
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/hayweb.dll \
               dist/hayweb-${{ matrix.target }}.dll
          else
            cp target/${{ matrix.target }}/release/libhayweb.${{ matrix.ext }} \
               dist/hayweb-${{ matrix.target }}.${{ matrix.ext }}
          fi

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hayweb-${{ matrix.target }}.*
