[package]
name = "hayweb"
version = "0.1.0"
edition = "2021"
description = "Web scraping and HTTP plugin for Hayashi"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
hayashi-plugin-sdk = { git = "https://github.com/sheep-farm/hayashi-plugin-sdk.git", branch = "main" }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde_json = "1.0"
